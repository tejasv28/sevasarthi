<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600&amp;family=Outfit:wght@500;800&amp;display=swap');
    </style>
    <linearGradient id="amberGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8960F"/>
      <stop offset="50%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>

  <!-- Logomark Background -->
  <rect x="8" y="8" width="64" height="64" rx="16" fill="url(#bgGrad)" />
  
  <!-- The Perfect 'S' -->
  <path d="M 50 32 
           A 10 10 0 0 0 30 32 
           C 30 40, 50 40, 50 48 
           A 10 10 0 0 1 30 48" 
        fill="none" stroke="url(#amberGrad)" stroke-width="8" stroke-linecap="round" />
        
  <!-- Sparkle Accent -->
  <path d="M 54 18 Q 54 22 58 22 Q 54 22 54 26 Q 54 22 50 22 Q 54 22 54 18 Z" fill="#FFFFFF" opacity="0.9"/>
  
  <!-- Sparkle 2 (smaller) -->
  <path d="M 24 54 Q 24 57 27 57 Q 24 57 24 60 Q 24 57 21 57 Q 24 57 24 54 Z" fill="#FCD34D" opacity="0.6"/>

  <!-- Wordmark -->
  <text x="88" y="46" font-family="'Outfit', system-ui, sans-serif" font-size="34" fill="#0F172A" letter-spacing="-0.5">
    <tspan font-weight="800">Seva</tspan>
    <tspan font-weight="500" fill="#334155"> Sarthi</tspan>
  </text>

  <!-- Tagline -->
  <text x="90" y="64" font-family="'Inter', system-ui, sans-serif" font-weight="600" font-size="10" fill="#64748B" letter-spacing="2.5">
    EXPERT HELP, JUST A TAP AWAY
  </text>
</svg>
